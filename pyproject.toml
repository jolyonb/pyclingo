[project]
name = "pyclingo"
version = "0.2.0"
description = "A python wrapper for clingo with ASP puzzle solving capabilities"
license = { text = "MIT" }
readme = "README.md"
requires-python = ">=3.14"
authors = [{ name = "Jolyon Bloomfield", email = "jkb84@cornell.edu" }]
dependencies = ["clingo>=5.8.0,<6"]

[dependency-groups]
dev = [
    "mypy>=2.1",
    "pre-commit>=4.6",
    "pyright>=1.1.411",
    "ruff>=0.15",
    "pytest>=9.1",
    "ty>=0.0.56",
]

[build-system]
requires = ["uv_build>=0.11,<0.13"]
build-backend = "uv_build"

[tool.uv.build-backend]
module-root = ""

[tool.mypy]
python_version = "3.14"
warn_return_any = true
warn_unused_configs = true
disallow_untyped_defs = true
disallow_incomplete_defs = true
check_untyped_defs = true
disallow_untyped_decorators = true
no_implicit_optional = true
strict_optional = true
files = ["pyclingo", "aspuzzle"]

[tool.pyright]
include = ["pyclingo", "aspuzzle"]

[tool.ruff]
line-length = 120

[tool.ruff.lint]
select = ["E", "F", "W", "Q", "I"]
fixable = ["ALL"]

[tool.ruff.lint.isort]
known-first-party = ["pyclingo", "aspuzzle"]
section-order = ["future", "standard-library", "third-party", "first-party", "local-folder"]

[tool.pytest.ini_options]
testpaths = ["tests", "pyclingo"]
addopts = "--doctest-modules"
python_files = "test_*.py"
python_functions = "test_*"
