name: CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v8.3.2  # pinned in full: setup-uv no longer publishes moving major tags

      - name: Run the full quality gauntlet
        run: |
          uv sync
          uv run pre-commit run --all-files
