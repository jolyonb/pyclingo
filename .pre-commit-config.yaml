repos:
  - repo: local
    hooks:
      # Run the ruff linter
      - id: ruff
        name: ruff (linter)
        description: "Run 'ruff' for extremely fast Python linting"
        entry: uv run ruff check
        language: system
        types: [python]
        args: [--fix]

      # Run the ruff formatter
      - id: ruff-format
        name: ruff (formatter)
        description: "Run 'ruff format' for extremely fast Python formatting"
        entry: uv run ruff format
        language: system
        types: [python]

      # Run mypy once over the pyproject file list: passing filenames fans
      # out into parallel batched invocations that thrash the shared cache
      - id: mypy
        name: mypy
        description: "Run 'mypy' to get static type checking"
        entry: uv run mypy
        language: system
        types: [python]
        pass_filenames: false

      # Run pyright once over the pyproject include list (same reasoning)
      - id: pyright
        name: pyright
        description: "Run 'pyright' to get static type checking"
        entry: uv run pyright
        language: system
        types: [python]
        pass_filenames: false

      # pyclingo standalone: the unit suite + module doctests, gated at 100%
      # line coverage. Excludes the puzzle integration test so the number is
      # what it will be after the aspuzzle repo split — pyclingo alone must be
      # fully covered, not propped up by puzzle-driven lines. (--cov needs the
      # whole run, so no -x: a fail-fast would report misleading coverage.)
      - id: pytest
        name: pytest (pyclingo, 100% coverage gate)
        description: "Run pyclingo's tests and enforce 100% line coverage"
        entry: uv run pytest
        language: system
        pass_filenames: false
        args:
          [
            "tests/",
            "pyclingo/",
            "--ignore=tests/test_puzzles.py",
            "--cov=pyclingo",
            "--cov-fail-under=100",
            "--cov-report=term-missing:skip-covered",
          ]

      # Puzzle integration smoke test (exercises aspuzzle end to end). Temporary:
      # this hook leaves with the aspuzzle repo split.
      - id: pytest-puzzles
        name: pytest (puzzle integration)
        description: "Solve the puzzle corpus end to end"
        entry: uv run pytest
        language: system
        pass_filenames: false
        args: ["-x", "tests/test_puzzles.py"]

  # Verify that the pre-commit configuration is valid
  - repo: local
    hooks:
      - id: validate-manifest
        name: validate pre-commit config
        entry: uv run pre-commit validate-config
        language: system
        pass_filenames: false
